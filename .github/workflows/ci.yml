name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - dev-jdi
      - 'codex/**'

jobs:
  test:
    name: cargo test (${{ matrix.os }}, JDK ${{ matrix.java }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
          - macos-latest
        java:
          - '8'
          - '11'
          - '17'
          - '21'

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: ${{ matrix.java }}

      - name: Show tool versions
        run: |
          rustc --version
          cargo --version
          java -version
          javac -version

      - name: Run tests
        run: cargo test
