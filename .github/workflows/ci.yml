name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - dev-jdi
      - 'codex/**'

jobs:
  test:
    name: cargo test (${{ matrix.os }}, JDK ${{ matrix.java }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
          - macos-latest
        java:
          - '8'
          - '11'
          - '17'
          - '21'

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17 for Gradle sidecar build
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Capture Gradle JDK
        shell: bash
        run: echo "JDBG_GRADLE_JAVA_HOME=$JAVA_HOME" >> "$GITHUB_ENV"

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: ${{ matrix.java }}

      - name: Show tool versions
        shell: bash
        run: |
          rustc --version
          cargo --version
          java -version
          javac -version
          "${JDBG_GRADLE_JAVA_HOME}/bin/java" -version

      - name: Run tests (serialized to avoid JDWP/JDI fixture contention)
        run: cargo test -- --test-threads=1
